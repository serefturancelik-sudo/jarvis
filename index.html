<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Jarvis Kontrol Paneli</title>
    <style>
        body { background-color: #1a1a1a; color: #e0e0e0; font-family: sans-serif; text-align: center; padding-top: 50px; }
        button { padding: 15px 30px; margin: 10px; border: none; border-radius: 5px; cursor: pointer; background: #333; color: white; transition: 0.3s; }
        button:hover { background: #555; }
        #status { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Jarvis AI Kontrol Merkezi</h1>
    
    <div>
        <button onclick="sendCommand('notepad_ac')">Notepad'i Aç</button>
        <button onclick="sendCommand('kamera_ac')">Kamerayı Başlat</button>
        <button onclick="sendCommand('hardware_test')">ESP32 Test</button>
    </div>

    <div id="status">Bekleniyor...</div>

    <script>
        async function sendCommand(action) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = "Komut gönderiliyor: " + action;

            try {
                // FastAPI sunucuna istek atıyoruz
                const response = await fetch(`/komut-calistir/${action}`);
                const data = await response.json();
                statusDiv.innerText = "Yanıt: " + data.durum;
            } catch (err) {
                statusDiv.innerText = "Hata: Sunucuya bağlanılamadı.";
            }
        }
    </script>
</body>
</html>
